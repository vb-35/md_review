services:
  md-review:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "8080:8000"
    environment:
      SECRET_KEY: change-me
      DATABASE_PATH: /data/md_review.db
      SESSION_FILE_DIR: /data/flask_session
      LOCAL_AUTH: "on"
    volumes:
      - md-review-data:/data
    restart: unless-stopped

volumes:
  md-review-data:
