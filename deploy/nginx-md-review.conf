location = /md-review {
    return 308 $scheme://$http_host/md-review/;
}

location /md-review/ {
    # nginx itself does not know the SSH user.
    # Inject X-Remote-User here only from a trusted local auth layer.
    # Never forward a client-supplied X-Remote-User header directly.
    # proxy_set_header X-Remote-User <trusted_local_identity>;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /md-review;
    proxy_pass http://127.0.0.1:18080/md-review/;
}
