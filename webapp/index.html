<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Review</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link id="highlight-theme" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
</head>
<body>
  <div id="app">
    <nav id="topbar" class="hidden">
      <div class="topbar-left">
        <button id="btn-menu" title="Documents">Documents</button>
        <span id="doc-title"></span>
        <span id="doc-role-badge" class="hidden badge"></span>
        <span id="lock-badge" class="hidden badge badge-lock"></span>
      </div>
      <div class="topbar-actions">
        <button id="btn-save" title="Save" disabled>&#10004; Save</button>
        <button id="btn-lock" title="Lock/Unlock" disabled>&#128277; Lock</button>
        <button id="btn-review" title="Version History" disabled>Review</button>
        <button id="btn-threads" title="Comments" disabled>Comments</button>
        <div class="settings-shell">
          <button id="btn-settings" title="Settings" aria-expanded="false" aria-controls="settings-panel">Settings</button>
          <div id="settings-panel" class="settings-panel hidden" role="dialog" aria-label="Settings">
            <div class="settings-group">
              <span class="settings-label">Theme</span>
              <label><input type="radio" name="theme" value="dark"> Dark</label>
              <label><input type="radio" name="theme" value="light"> Light</label>
            </div>
            <label class="settings-checkbox">
              <input type="checkbox" id="toggle-sync-view">
              <span>Sync view</span>
            </label>
          </div>
        </div>
        <span id="user-display"></span>
        <button id="btn-logout">Logout</button>
      </div>
    </nav>

    <main id="login-screen">
      <div class="login-box">
        <h1>MD Review</h1>
        <p id="login-hint" class="hidden"></p>
        <form id="login-form">
          <input type="text" id="login-username" placeholder="Username" autocomplete="username" required>
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
          <button type="submit">Sign In</button>
        </form>
        <p id="login-error" class="error hidden"></p>
      </div>
    </main>

    <main id="dashboard-screen" class="hidden">
      <div class="dashboard-shell">
        <section class="dashboard-list-panel">
          <div class="dashboard-panel-header">
            <div>
              <h2>Documents</h2>
              <p>Browse owned and shared documents.</p>
            </div>
            <div class="dashboard-actions">
              <input
                type="file"
                id="import-markdown-input"
                class="hidden"
                accept=".md,.markdown,text/markdown,text/plain"
              >
              <button id="btn-import-doc" type="button">Import Markdown</button>
              <button id="btn-new-doc" class="primary">+ New Document</button>
            </div>
          </div>

          <div class="dashboard-section">
            <div class="section-label">Owned by me</div>
            <div id="owned-docs" class="document-list"></div>
          </div>

          <div class="dashboard-section">
            <div class="section-label">Shared with me</div>
            <div id="shared-docs" class="document-list"></div>
          </div>
        </section>

        <section class="dashboard-detail-panel">
          <div id="doc-detail-empty" class="empty-state">
            Select a document to inspect its metadata and sharing.
          </div>

          <div id="doc-detail" class="hidden">
            <div class="detail-header">
              <div>
                <div id="detail-title" class="detail-title"></div>
                <div id="detail-subtitle" class="detail-subtitle"></div>
              </div>
              <div class="detail-actions">
                <button id="btn-open-doc" class="primary">Open Editor</button>
                <button id="btn-delete-doc" class="danger hidden">Delete</button>
              </div>
            </div>

            <div class="detail-grid">
              <div class="detail-card">
                <h3>Metadata</h3>
                <dl id="doc-metadata" class="metadata-list"></dl>
              </div>

              <div class="detail-card">
                <h3>Access</h3>
                <div id="doc-access-summary" class="access-summary"></div>
              </div>
            </div>

            <div id="share-card" class="detail-card hidden">
              <div class="share-card-header">
                <h3>Sharing</h3>
                <span>Owner only</span>
              </div>
              <form id="share-form" class="share-form">
                <input type="text" id="share-username" placeholder="Existing username" autocomplete="off">
                <select id="share-role">
                  <option value="viewer">Viewer</option>
                  <option value="editor">Editor</option>
                </select>
                <button type="submit">Share</button>
              </form>
              <p id="share-error" class="error hidden"></p>
              <div id="share-list" class="share-list"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <main id="editor-screen" class="hidden">
      <div id="split-view">
        <div id="editor-pane">
          <div class="pane-header">Source</div>
          <textarea id="editor" spellcheck="false"></textarea>
        </div>
        <div id="preview-pane">
          <div class="pane-header">Preview</div>
          <div id="preview" class="markdown-body"></div>
        </div>
      </div>
    </main>

    <div id="review-panel" class="panel hidden">
      <div class="panel-header">
        <h3>Version History</h3>
        <button id="btn-close-review" class="panel-close">&times;</button>
      </div>
      <div id="version-actions">
        <button id="btn-select-base">Select Base</button>
        <button id="btn-select-head">Select Head</button>
        <button id="btn-compare">Diff</button>
      </div>
      <select id="version-select-base"></select>
      <select id="version-select-head"></select>
      <div id="diff-view"></div>
      <div id="version-diff-actions" class="hidden">
        <button id="btn-revert" class="btn-revert">Revert to this version</button>
        <span id="diff-meta"></span>
      </div>
    </div>

    <div id="comments-panel" class="panel hidden">
      <div class="panel-header">
        <h3>Comments</h3>
        <div class="comments-panel-actions">
          <label>
            <input type="checkbox" id="show-resolved"> Show resolved
          </label>
          <button id="btn-close-comments" class="panel-close">&times;</button>
        </div>
      </div>
      <div id="thread-list"></div>
      <div id="new-thread" class="new-thread">
        <input type="text" id="thread-body" placeholder="New comment...">
        <button id="btn-add-thread">Post</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
